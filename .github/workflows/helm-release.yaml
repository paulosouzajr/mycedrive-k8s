name: Release Helm Chart

# Publishes the mycedrive Helm chart to GitHub Pages so users can install it with:
#   helm repo add mycedrive https://paulosouzajr.github.io/mycedrive-k8s
#   helm repo update
#   helm install mycedrive mycedrive/mycedrive

on:
  push:
    branches: [main]
    paths:
      - 'deployment/myce-server/mycedrive/**'
      - '.github/workflows/helm-release.yaml'
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push to gh-pages branch

    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Package chart
        run: |
          mkdir -p .chart-output
          helm package deployment/myce-server/mycedrive --destination .chart-output

      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Update Helm repo index
        run: |
          cp .chart-output/*.tgz gh-pages/
          helm repo index gh-pages --url https://paulosouzajr.github.io/mycedrive-k8s --merge gh-pages/index.yaml

      - name: Push to gh-pages
        run: |
          cd gh-pages
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet || git commit -m "helm: release $(ls ../.chart-output/*.tgz | xargs basename)"
          git push origin gh-pages
