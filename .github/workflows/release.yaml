name: Release

# Cut a release by pushing a semver tag:
#   git tag v0.1.0 && git push origin v0.1.0
#
# This publishes:
#   - docker.io/mycedrive/{operator,go-agent,dmtcp}:<version> and :latest
#   - the Helm chart at <version> to the gh-pages Helm repo
#   - a GitHub Release with the packaged chart attached

on:
  push:
    tags: ['v*']

jobs:
  images:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: operator
            context: operator
          - name: go-agent
            context: go-agent
          - name: dmtcp
            context: dmtcp
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Resolve version
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            mycedrive/${{ matrix.name }}:${{ steps.ver.outputs.version }}
            mycedrive/${{ matrix.name }}:latest

  chart:
    runs-on: ubuntu-latest
    needs: images
    permissions:
      contents: write   # gh-pages push + GitHub Release
    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Resolve version
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Package chart at release version
        run: |
          mkdir -p .chart-output
          helm package deployment/operator \
            --version "${{ steps.ver.outputs.version }}" \
            --app-version "${{ steps.ver.outputs.version }}" \
            --destination .chart-output

      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Update Helm repo index
        run: |
          cp .chart-output/*.tgz gh-pages/
          helm repo index gh-pages --url https://paulosouzajr.github.io/mycedrive-k8s --merge gh-pages/index.yaml

      - name: Push to gh-pages
        run: |
          cd gh-pages
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet || git commit -m "helm: release chart ${{ steps.ver.outputs.version }}"
          git push origin gh-pages

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: .chart-output/*.tgz
          generate_release_notes: true
